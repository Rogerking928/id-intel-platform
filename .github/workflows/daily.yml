# Daily automatic update — runs in GitHub's cloud, for FREE, even when your
# own computer is off. It collects new data, runs AI extraction, and commits
# the refreshed database back to the repo so the public Streamlit site updates.
#
# Reliability note: GitHub's free scheduler is "best effort" — it often delays
# or silently DROPS scheduled runs under load, so a couple of daily triggers
# aren't enough (we saw 2 of 3 dropped on the same day). Fix: try MANY times a
# day (every 2 hours) and let a built-in guard make every attempt after the
# day's first successful update skip in a few seconds — no pip install, no AI
# calls, no wasted Gemini quota. This repo is public, so GitHub Actions minutes
# are free and unlimited, making the extra attempts effectively cost-nothing.
# Net effect: for GitHub to miss a whole day it would have to drop ~12 runs in
# a row, which practically never happens — so the site updates itself.
#
# Setup (one-time):
#   1. Push this project to a GitHub repository.
#   2. In the repo: Settings -> Secrets and variables -> Actions -> New secret
#        Name:  GEMINI_API_KEY     Value: <your Gemini key>
#   3. That's it. It self-updates on the schedule below; you can also trigger
#      it by hand from the repo's "Actions" tab ("Run workflow").
name: daily-update

on:
  schedule:
    # Try every 2 hours at an off-round minute (:17 avoids GitHub's congested
    # top-of-hour queue). The guard below makes all attempts after the day's
    # first update skip cheaply, so this is many chances but only one real run.
    - cron: "17 */2 * * *"
  workflow_dispatch: {}      # lets you run it manually from the Actions tab

# allow the job to push the updated database back to the repo
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: daily-update
      cancel-in-progress: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Every scheduled attempt after today's update already landed skips here
      # in seconds. Manual runs (workflow_dispatch) always proceed so you can
      # force an update whenever you want.
      - name: Skip if already updated today
        id: guard
        run: |
          today=$(date -u +%F)
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Manual/other trigger — will run."
          elif git log -1 --pretty=%s | grep -q "daily data update ($today)"; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Already updated for $today — this attempt will skip."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Not yet updated for $today — will run."
          fi

      - name: Set up Python
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Run daily collection + AI extraction + weekly report
        if: steps.guard.outputs.run == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          # keep within Gemini free-tier limits per run
          GEMINI_MAX_PER_RUN: "80"
          GEMINI_MIN_INTERVAL: "4.5"
        run: python run_daily.py --report

      - name: Commit refreshed database + report
        if: steps.guard.outputs.run == 'true'
        run: |
          git config user.name  "id-intel-bot"
          git config user.email "actions@github.com"
          git add -f data/id_intel.db reports/*.md reports/*.html || true
          git commit -m "auto: daily data update ($(date -u +%F))" || echo "nothing to commit"
          git push || echo "nothing to push"
